<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>翼语通 - 登机口智能广播系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* Orange UI Design System Tokens */
            /* Backgrounds - 原研哉的"空"：留白创造呼吸感 */
            --bg: #F7F3EC;
            --bg-secondary: #FCFAF6;
            --card: #FFFDFA;
            --card-hover: #F9F5EE;

            /* Text - Dieter Rams：清晰的层次结构 */
            --text: #35322F;
            --text-secondary: #5E5A55;
            --text-muted: #8B847C;
            --text-light: #FFFFFF;

            /* Border & Shadow - Neo-Brutalist 诚实的结构 */
            --border: #999188;
            --border-light: #DED8CF;
            --shadow-color: #B9B2A8;

            /* Brand Accent - 有目的的色彩 */
            --primary: #7BCBFF;
            --primary-hover: #5ABBFF;
            --primary-active: #3EA9F6;

            --accent: #FFE66A;
            --accent-hover: #FFDB3A;
            --accent-text: #4F3C00;
            --accent-bg: rgba(255, 230, 106, 0.38);

            /* Semantic Colors */
            --success: #6FD8C7;
            --success-bg: #EAF9F5;
            --success-text: #1E6558;
            --warning: #F6DA78;
            --warning-bg: rgba(246, 218, 120, 0.20);
            --warning-text: #665000;
            --error: #FF998F;
            --error-bg: #FFE7E2;
            --error-text: #993F35;
            --info: #7BCBFF;
            --info-bg: #EAF5FF;
            --info-text: #2B6CA3;

            /* System Values - Rams 的精确 */
            --radius-sm: 2px;
            --radius: 4px;
            --radius-lg: 8px;
            --radius-full: 9999px;
            --border-width: 1.5px;

            /* Neo-Brutalist Hard Shadows */
            --shadow-xs: 2px 2px 0 0 var(--shadow-color);
            --shadow-sm: 3px 3px 0 0 var(--shadow-color);
            --shadow: 5px 5px 0 0 var(--shadow-color);
            --shadow-lg: 7px 7px 0 0 var(--shadow-color);
            --shadow-active: 3px 3px 0 0 var(--primary-active);

            /* Spacing (8pt grid) */
            --space-1: 4px;
            --space-2: 8px;
            --space-3: 12px;
            --space-4: 16px;
            --space-5: 20px;
            --space-6: 24px;
            --space-8: 32px;
            --space-10: 40px;
            --space-12: 48px;
            --space-16: 64px;

            /* Animation */
            --duration-fast: 150ms;
            --duration: 200ms;
            --duration-slow: 300ms;
            --ease: ease-in-out;
            --ease-out: cubic-bezier(0.16, 1, 0.3, 1);

            /* Font */
            --font-sans: 'Inter', 'Noto Sans SC', 'PingFang SC', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.65;
            letter-spacing: 0.01em;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            -webkit-tap-highlight-color: transparent;
            min-height: 100vh;
        }

        .container {
            max-width: 430px;
            margin: 0 auto;
            min-height: 100vh;
            background: var(--bg);
            position: relative;
            overflow-x: hidden;
        }

        /* Header */
        header {
            background: var(--bg);
            color: var(--text);
            padding: 12px 16px 6px 16px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: none;
        }

        .header-hero {
            background: var(--primary);
            border: var(--border-width) solid var(--border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            padding: 10px 12px;
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-title {
            font-size: 19px;
            font-weight: 600;
            letter-spacing: -0.02em;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: transparent;
            color: var(--text);
            border: none;
            padding: 0;
            box-shadow: none;
        }

        .header-back {
            background: var(--card);
            border: var(--border-width) solid var(--border);
            color: var(--text);
            width: 40px;
            height: 40px;
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
            transition: all var(--duration) var(--ease);
            box-shadow: var(--shadow-xs);
        }

        .header-back:active {
            transform: translateY(1px);
            box-shadow: none;
        }

        .header-action {
            background: var(--card);
            border: var(--border-width) solid var(--border);
            color: var(--text);
            width: 40px;
            height: 40px;
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            cursor: pointer;
            transition: all var(--duration) var(--ease);
            box-shadow: var(--shadow-xs);
        }

        .header-action:active {
            transform: translateY(1px);
            box-shadow: none;
        }

        /* Pages */
        .page {
            display: none;
            padding: 16px;
            padding-bottom: 120px;
            min-height: calc(100vh - 64px);
        }

        .page.active {
            display: block;
            animation: fadeIn 0.25s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Entry Page */
        .entry-card {
            background: var(--card);
            border: var(--border-width) solid var(--border);
            border-radius: var(--radius-lg);
            padding: 18px;
            box-shadow: var(--shadow);
        }

        .entry-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 6px;
            letter-spacing: -0.02em;
        }

        .entry-subtitle {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 14px;
        }

        .primary-btn {
            width: 100%;
            padding: 12px 14px;
            background: var(--primary);
            color: var(--text);
            border: var(--border-width) solid var(--border);
            border-radius: var(--radius);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--duration) var(--ease);
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .primary-btn:active {
            transform: translateY(1px);
            box-shadow: var(--shadow-sm);
            background: var(--primary-active);
        }

        /* Home Page - Scenario Cards */
        .scenario-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 4px 0 16px 0;
        }

        .scenario-card {
            background: var(--card);
            border: var(--border-width) solid var(--border);
            border-radius: var(--radius-lg);
            padding: 18px 12px;
            text-align: center;
            cursor: pointer;
            transition: all var(--duration) var(--ease);
            min-height: 96px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow);
        }

        .scenario-card:active {
            transform: translateY(1px);
            border-color: var(--primary);
            box-shadow: var(--shadow-sm);
        }

        .scenario-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .scenario-card .icon {
            font-size: 28px;
            margin-bottom: 8px;
            line-height: 1;
        }

        .scenario-card .title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            letter-spacing: -0.01em;
        }

        .scenario-card .count {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 4px;
            background: var(--bg-secondary);
            padding: 3px 8px;
            border-radius: var(--radius-sm);
            font-weight: 500;
        }

        /* Hot Section */
        .hot-section {
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
            letter-spacing: -0.01em;
        }

        .section-title .hot-icon {
            color: var(--primary);
        }

        .hot-cards {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .hot-card {
            background: var(--card);
            border: var(--border-width) solid var(--border);
            border-radius: var(--radius-lg);
            padding: 12px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: all var(--duration) var(--ease);
            box-shadow: var(--shadow);
        }

        .hot-card:active {
            transform: translateY(1px);
            border-color: var(--primary);
            box-shadow: var(--shadow-sm);
        }

        .hot-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .hot-card .hot-info {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
        }

        .hot-card .hot-badge {
            background: var(--accent);
            color: var(--accent-text);
            font-size: 10px;
            font-weight: 600;
            padding: 3px 7px;
            border-radius: var(--radius-sm);
            white-space: nowrap;
            letter-spacing: 0.02em;
            border: var(--border-width) solid var(--border);
            box-shadow: var(--shadow-xs);
        }

        .hot-card .hot-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
        }

        .hot-card .hot-arrow {
            color: var(--text-secondary);
            font-size: 16px;
        }

        /* Favorites Button */
        .favorites-btn {
            position: fixed;
            bottom: calc(16px + env(safe-area-inset-bottom));
            right: 16px;
            width: 52px;
            height: 52px;
            background: var(--error);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow);
            cursor: pointer;
            z-index: 90;
            transition: all var(--duration) var(--ease);
            border: var(--border-width) solid var(--border);
        }

        .favorites-btn:active {
            transform: translateY(1px);
            box-shadow: var(--shadow-sm);
        }

        .favorites-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .favorites-btn svg {
            width: 24px;
            height: 24px;
            fill: var(--text);
        }

        .favorites-badge {
            position: absolute;
            top: -3px;
            right: -3px;
            background: var(--primary);
            color: var(--text-light);
            font-size: 10px;
            font-weight: 600;
            min-width: 18px;
            height: 18px;
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 5px;
            border: var(--border-width) solid var(--border);
            box-shadow: var(--shadow-xs);
        }

        /* Favorites Page */
        .favorites-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .favorite-item {
            background: var(--card);
            border: var(--border-width) solid var(--border);
            border-radius: var(--radius-lg);
            padding: 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: all var(--duration) var(--ease);
            box-shadow: var(--shadow);
        }

        .favorite-item:active {
            transform: translateY(1px);
            border-color: var(--primary);
            box-shadow: var(--shadow-sm);
        }

        .favorite-item:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .favorite-item .fav-info {
            flex: 1;
        }

        .favorite-item .fav-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 4px;
            letter-spacing: -0.01em;
        }

        .favorite-item .fav-tags {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }

        .tag {
            font-size: 10px;
            padding: 3px 7px;
            border-radius: 5px;
            font-weight: 500;
            letter-spacing: 0.02em;
        }

        .tag-scenario {
            background: var(--info-bg);
            color: var(--info-text);
        }

        .tag-fillable {
            background: var(--accent);
            color: var(--accent-text);
        }

        .remove-fav {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 20px;
            cursor: pointer;
            padding: 12px;
            margin-left: 6px;
        }

        /* Enhanced Search */
        .search-suggestions {
            background: transparent;
            border-radius: 0;
            margin: 6px 0 12px 0;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 0;
            border: none;
        }

        .search-tag {
            background: var(--primary);
            border: var(--border-width) solid var(--border);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 12px;
            color: var(--text);
            cursor: pointer;
            transition: all var(--duration) var(--ease);
            font-weight: 600;
            box-shadow: var(--shadow-xs);
            min-height: 32px;
            display: inline-flex;
            align-items: center;
        }

        .search-tag:active {
            transform: translateY(1px);
            box-shadow: var(--shadow-xs);
            background: var(--primary-dark);
        }

        .search-tag.selected {
            background: var(--primary-hover);
        }

        .search-tag:hover {
            transform: translateY(-1px);
            box-shadow: var(--shadow-sm);
            background: var(--primary-hover);
        }

        /* Enhanced Broadcast Item */
        .broadcast-item .item-meta {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 8px;
            flex-wrap: wrap;
        }

        .broadcast-item .item-tag {
            font-size: 10px;
            padding: 3px 7px;
            border-radius: 5px;
            font-weight: 500;
            letter-spacing: 0.02em;
        }

        .broadcast-item .item-fillable {
            font-size: 10px;
            color: var(--text-secondary);
            background: var(--bg-secondary);
            padding: 3px 7px;
            border-radius: 5px;
            display: flex;
            align-items: center;
            gap: 3px;
            font-weight: 600;
            border: var(--border-width) solid var(--border-light);
        }

        .broadcast-item .item-fillable.has-fields {
            background: var(--accent);
            color: var(--accent-text);
            border-color: var(--border);
        }

        .broadcast-item .fav-star {
            color: #F59E0B;
            font-size: 14px;
        }

        /* Dynamic Form */
        .dynamic-form {
            margin-bottom: 20px;
        }

        .missing-fields-alert {
            background: var(--accent);
            border: var(--border-width) solid var(--border);
            border-radius: var(--radius);
            padding: 12px 14px;
            margin-bottom: 14px;
            display: flex;
            align-items: flex-start;
            gap: 8px;
            box-shadow: var(--shadow-sm);
        }

        .missing-fields-alert .alert-icon {
            font-size: 16px;
            flex-shrink: 0;
        }

        .missing-fields-alert .alert-text {
            font-size: 13px;
            color: var(--accent-text);
            line-height: 1.5;
        }

        .missing-fields-alert .alert-text strong {
            font-weight: 700;
        }

        .preview-status {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 8px;
            text-align: right;
        }

        .preview-status.ready {
            color: var(--success);
        }

        .preview-status.missing {
            color: var(--error);
        }

        /* Add Favorite Button */
        .add-fav-btn {
            background: var(--card);
            border: var(--border-width) solid var(--border);
            border-radius: 8px;
            padding: 8px 13px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 16px;
            transition: all var(--duration) var(--ease);
            box-shadow: var(--shadow-sm);
        }

        .add-fav-btn:active {
            border-color: var(--primary);
            color: var(--text);
            transform: translateY(1px);
            box-shadow: var(--shadow-xs);
        }

        .add-fav-btn.is-favorite {
            background: var(--accent);
            border-color: var(--border);
            color: var(--accent-text);
        }

        .add-fav-btn svg {
            width: 17px;
            height: 17px;
            fill: currentColor;
        }

        /* Empty Favorites */
        .empty-favorites {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-favorites .icon {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-favorites .text {
            font-size: 16px;
            margin-bottom: 8px;
        }

        .empty-favorites .hint {
            font-size: 14px;
            opacity: 0.7;
        }

        /* Scenario Page - List */
        .global-search {
            position: sticky;
            top: 56px;
            z-index: 90;
            background: var(--bg);
            padding: 10px 16px 8px 16px;
        }

        .search-box {
            position: relative;
            background: transparent;
            padding: 0 0 8px 0;
        }

        .selected-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 8px;
        }

        .selected-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 8px;
            border-radius: var(--radius-full);
            background: var(--primary);
            color: var(--text);
            border: var(--border-width) solid var(--border);
            font-size: 12px;
            font-weight: 600;
            box-shadow: var(--shadow-xs);
        }

        .selected-tag button {
            border: none;
            background: transparent;
            color: var(--text);
            font-size: 12px;
            cursor: pointer;
            padding: 0;
            line-height: 1;
        }

        .search-input {
            width: 100%;
            padding: 14px 16px;
            border: var(--border-width) solid var(--border);
            border-radius: var(--radius-lg);
            font-size: 16px;
            background: var(--card);
            transition: all var(--duration) var(--ease);
            font-weight: 500;
            box-shadow: var(--shadow);
        }

        .search-input:focus {
            outline: none;
            border-color: var(--primary);
            background-color: var(--card);
            box-shadow: var(--shadow-sm);
        }

        .search-input::placeholder {
            color: var(--text-muted);
        }

        .broadcast-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-bottom: 16px;
        }

        .broadcast-item {
            background: var(--card);
            border: var(--border-width) solid var(--border);
            border-radius: var(--radius-lg);
            padding: 14px;
            cursor: pointer;
            transition: all var(--duration) var(--ease);
            box-shadow: var(--shadow);
        }

        .broadcast-item:active {
            transform: translateY(1px);
            border-color: var(--primary);
            box-shadow: var(--shadow-sm);
        }

        .broadcast-item:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .broadcast-item .item-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 4px;
            letter-spacing: -0.01em;
        }

        .broadcast-item .item-type {
            font-size: 12px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .broadcast-item .item-type::before {
            content: '';
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--primary);
        }

        /* Detail Page */
        .broadcast-detail {
            background: var(--card);
            border-radius: var(--radius-lg);
            padding: 18px;
            box-shadow: var(--shadow);
            margin-bottom: 16px;
        }

        .detail-header {
            margin-bottom: 18px;
            padding-bottom: 14px;
            border-bottom: var(--border-width) solid var(--border-light);
        }

        .detail-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 6px;
            letter-spacing: -0.02em;
        }

        .detail-type {
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* Parameters Form */
        .params-form {
            margin-bottom: 18px;
        }

        .form-group {
            margin-bottom: 14px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 7px;
        }

        .form-input {
            width: 100%;
            padding: 12px 14px;
            border: var(--border-width) solid var(--border);
            border-radius: var(--radius);
            font-size: 15px;
            transition: all var(--duration) var(--ease);
            background: var(--card);
            box-shadow: var(--shadow-xs);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: var(--shadow-sm);
        }

        /* Language Tabs */
        .language-tabs {
            display: flex;
            background: var(--bg);
            border-radius: var(--radius);
            padding: 5px;
            margin-bottom: 16px;
            border: var(--border-width) solid var(--border);
            box-shadow: var(--shadow-xs);
        }

        .lang-tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            border: none;
            background: transparent;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            border-radius: var(--radius);
            cursor: pointer;
            transition: all var(--duration) var(--ease);
        }

        .lang-tab.active {
            background: var(--primary);
            color: var(--text);
            box-shadow: var(--shadow-sm);
        }

        .lang-tab:hover:not(.active) {
            background: var(--bg-secondary);
        }

        /* Broadcast Content */
        .broadcast-content {
            background: var(--bg);
            border-radius: var(--radius);
            padding: 14px;
            min-height: 110px;
            max-height: 280px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            margin-bottom: 16px;
            font-size: 15px;
            line-height: 1.75;
            color: var(--text);
            border: var(--border-width) solid var(--border);
        }

        /* Play Button */
        .play-button {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: var(--text);
            border: var(--border-width) solid var(--border);
            border-radius: var(--radius);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--duration) var(--ease);
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .play-button:active {
            transform: translateY(1px);
            box-shadow: var(--shadow-sm);
            background: var(--primary-active);
        }

        .play-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: var(--shadow-sm);
            background: var(--bg-secondary);
        }

        .play-button .play-icon {
            width: 22px;
            height: 22px;
            fill: currentColor;
        }

        /* Loading Animation */
        .loading-spinner {
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: var(--text-light);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state .icon {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-state .text {
            font-size: 16px;
        }

        /* Status Toast */
        .toast {
            position: fixed;
            bottom: calc(96px + env(safe-area-inset-bottom));
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--text);
            color: var(--bg);
            padding: 13px 24px;
            border-radius: var(--radius);
            font-size: 14px;
            font-weight: 600;
            box-shadow: var(--shadow-lg);
            opacity: 0;
            transition: all var(--duration-slow) var(--ease);
            z-index: 200;
            white-space: nowrap;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast.success {
            background: var(--success);
            color: var(--success-text);
        }

        /* Responsive */
        @media (max-width: 430px) {
            .broadcast-content {
                max-height: none;
            }

            .search-input {
                font-size: 15px;
            }

            .broadcast-item .item-type {
                font-size: 13px;
            }

            .tag,
            .broadcast-item .item-fillable,
            .broadcast-item .item-tag {
                font-size: 12px;
            }
        }

        @media (max-width: 360px) {
            .scenario-grid {
                grid-template-columns: 1fr;
            }

            .scenario-card {
                min-height: 100px;
                padding: 16px 12px;
            }

            .scenario-card .icon {
                font-size: 28px;
            }

            .scenario-card .title {
                font-size: 14px;
            }

            .container {
                max-width: 100%;
            }
        }
    </style>
</head>

            { label: "延误", keywords: ["延误", "航延", "晚到", "推时", "到港", "delay"] },
            { label: "登机", keywords: ["登机", "登机口", "催促", "boarding"] },
            { label: "取消", keywords: ["取消", "cancel", "补偿"] },
            { label: "行李", keywords: ["三超", "行李"] },
            { label: "升舱", keywords: ["升舱", "upgrade"] },
            { label: "天气", keywords: ["天气", "航路天气"] },
            { label: "管制", keywords: ["航空管制", "流控"] },
            { label: "检查", keywords: ["专项检查", "安检"] }
        ];

        const selectedTags = new Set();

        function tokenizeQuery(value) {
            return value
                .split(/\s+/)
                .map(t => t.trim())
                .filter(Boolean);
        }

        function syncSelectedTagsFromInput(value) {
            selectedTags.clear();
            const tokens = tokenizeQuery(value);
            const labels = new Set(searchTags.map(tag => tag.label));
            tokens.forEach(token => {
                if (labels.has(token)) {
                    selectedTags.add(token);
                }
            });
        }

        function updateSearchInputFromTags(extraTokens = []) {
            const tagTokens = Array.from(selectedTags);
            const tokens = [...tagTokens, ...extraTokens.filter(t => !tagTokens.includes(t))];
            const input = document.getElementById('searchInput');
            input.value = tokens.join(' ');
            renderSelectedTags();
        }

        function renderSelectedTags() {
            const container = document.getElementById('selectedTags');
            container.innerHTML = '';
            if (selectedTags.size === 0) {
                return;
            }
            Array.from(selectedTags).forEach(label => {
                const tagEl = document.createElement('div');
                tagEl.className = 'selected-tag';
                tagEl.innerHTML = `<span>${label}</span><button type="button" aria-label="移除 ${label}">×</button>`;
                tagEl.querySelector('button').addEventListener('click', () => {
                    selectedTags.delete(label);
                    const input = document.getElementById('searchInput');
                    const tokens = tokenizeQuery(input.value).filter(t => t && t !== label);
                    updateSearchInputFromTags(tokens);
                    input.dispatchEvent(new Event('input'));
                });
                container.appendChild(tagEl);
            });
        }

        // Initialize all broadcasts array
        function initBroadcasts() {
            allBroadcasts = [];
            for (const [scenarioKey, broadcasts] of Object.entries(broadcastData.scenarios)) {
                broadcasts.forEach(broadcast => {
                    allBroadcasts.push({
                        ...broadcast,
                        scenarioKey: scenarioKey,
                        id: broadcast.广播类型
                    });
                });
            }
        }

        // Detect if template is fillable and what fields it needs
        // Only detects explicit placeholders (e.g., CXX, CAxxxx, ___, XX), not generic words
        function detectFillableFields(broadcast) {
            const text = broadcast.中文 + broadcast.英文 + broadcast.粤语;
            const fields = [];

            // Explicit placeholder patterns only - no generic word detection
            // Flight number: CAxxxx, CAXXXX, CA1234, CA____, ___ (3+ underscores)
            if (/CA[0-9]{4}|CA[XXXX]{4}|CA[xX]{4}|CA_____{3,}|___{3,}|_{3,}/.test(text)) {
                fields.push({ name: 'flightNumber', label: '航班号', example: 'CA1234', pattern: /CA[0-9]{4}|CA[XXXX]{4}|CA[xX]{4}|CA_____{3,}|___{3,}|_{3,}/g });
            }

            // Gate number: CXX, CXX号, C\d+ (only explicit patterns with C prefix)
            if (/CXX|CXX号|C\d+号?/.test(text)) {
                fields.push({ name: 'gateNumber', label: '登机口', example: 'C15', pattern: /CXX|CXX号|C\d+号?/g });
            }

            // Time: XX:XX format (2-4 digits, colon, 2 digits)
            if (/\d{1,2}:\d{2}/.test(text)) {
                fields.push({ name: 'time', label: '时间', example: '18:00', pattern: /\d{1,2}:\d{2}/g });
            }

            // XX placeholders or explicit "前往/飞往/去往" phrases treated as destination
            if (/XX+/.test(text) || /(前往|飞往|去往)[\u4e00-\u9fffA-Za-z·]+/.test(text)) {
                fields.push({ name: 'destination', label: '目的地', example: '伦敦', pattern: /XX+/g });
            }

            return fields;
        }

        // Get category for a broadcast type
        function getBroadcastCategory(broadcastType) {
            for (const [key, scenario] of Object.entries(scenarioCategories)) {
                if (scenario.broadcasts.includes(broadcastType)) {
                    return { key, name: scenario.name };
                }
            }
            return { key: 'other', name: '其他' };
        }

        // Favorites management
        function saveFavorites() {
            localStorage.setItem('yiyutong_favorites', JSON.stringify(favorites));
            updateFavoritesBadge();
        }

        function isFavorite(broadcastType) {
            return favorites.some(f => f.broadcastType === broadcastType);
        }

        function addFavorite(broadcast) {
            if (!isFavorite(broadcast.广播类型)) {
                const category = getBroadcastCategory(broadcast.广播类型);
                favorites.push({
                    broadcastType: broadcast.广播类型,
                    scenario: broadcast.广播场景 || '通用',
                    category: category.name,
                    scenarioKey: category.key,
                    timestamp: Date.now()
                });
                saveFavorites();
                return true;
            }
            return false;
        }

        function removeFavorite(broadcastType) {
            const index = favorites.findIndex(f => f.broadcastType === broadcastType);
            if (index > -1) {
                favorites.splice(index, 1);
                saveFavorites();
                return true;
            }
            return false;
        }

            const badge = document.getElementById('favoritesBadge');

            if (count > 0) {

                badge.style.display = 'flex';

        function renderSearchSuggestions() {
            const container = document.getElementById('searchSuggestions');
            container.innerHTML = '';

            searchTags.forEach(tag => {
                const tagEl = document.createElement('div');
                tagEl.className = 'search-tag';
                tagEl.dataset.label = tag.label;
                tagEl.textContent = tag.label;
                tagEl.addEventListener('click', () => {
                    if (selectedTags.has(tag.label)) {
                        selectedTags.delete(tag.label);
                    } else {
                        selectedTags.add(tag.label);
                    }

                    const input = document.getElementById('searchInput');
                    const tokens = tokenizeQuery(input.value).filter(t => t && !selectedTags.has(t));
                    updateSearchInputFromTags(tokens);
                    input.dispatchEvent(new Event('input'));
                });
                container.appendChild(tagEl);
            });

            updateTagSelection();
        }

        function updateTagSelection() {
            const tokens = tokenizeQuery(document.getElementById('searchInput').value);
            document.querySelectorAll('.search-tag').forEach(tagEl => {
                const label = tagEl.dataset.label;
                tagEl.classList.toggle('selected', tokens.includes(label));

        function createDynamicForm(fields) {
            const container = document.getElementById('dynamicFormContainer');

            if (fields.length === 0) {
                container.innerHTML = '';
                document.getElementById('missingFieldsAlert').style.display = 'none';
                return;
            }

            let html = '<div class="params-form dynamic-form">';
            fields.forEach(field => {
                html += `
                    <div class="form-group">
                        <label for="${field.name}">${field.label}</label>
                        <input type="text" class="form-input field-input" id="${field.name}"
                               placeholder="例如：${field.example}" data-field="${field.name}">
                    </div>
                `;
            });
            html += '</div>';
            container.innerHTML = html;

            // Prefill from saved flight info
            if (flightInfo) {
                container.querySelectorAll('.field-input').forEach(input => {
                    const key = input.dataset.field;
                    if (flightInfo[key]) {
                        input.value = flightInfo[key];
                    }
                });
            }

            // Add input listeners for real-time preview
            container.querySelectorAll('.field-input').forEach(input => {
                input.addEventListener('input', () => {
                    updateBroadcastContent();
                    updatePreviewStatus();
                });
            });
        }

        function updatePreviewStatus() {
            const statusEl = document.getElementById('previewStatus');
            const alertEl = document.getElementById('missingFieldsAlert');
            const alertText = document.getElementById('missingFieldsText');

            if (currentFillableFields.length === 0) {
                statusEl.textContent = '直接可用模板';
                statusEl.className = 'preview-status ready';
                alertEl.style.display = 'none';
                return;
            }

            // Check which fields are missing
            const missingFields = [];
            currentFillableFields.forEach(field => {
                const input = document.getElementById(field.name);
                if (!input || !input.value.trim()) {
                    missingFields.push(field.label);
                }
            });

            if (missingFields.length > 0) {
                statusEl.textContent = `缺少${missingFields.length}个必填字段`;
                statusEl.className = 'preview-status missing';
                alertEl.style.display = 'flex';
                alertText.innerHTML = `请填写以下字段：<strong>${missingFields.join('、')}</strong>`;
            } else {
                statusEl.textContent = '预览就绪';
                statusEl.className = 'preview-status ready';
                alertEl.style.display = 'none';
            }
        }

        function updateBroadcastContent() {
            const content = document.getElementById('broadcastContent');
            let text = currentBroadcast[currentLanguage === 'zh' ? '中文' : currentLanguage === 'en' ? '英文' : '粤语'] || '';

            // Replace explicit placeholders with dynamic form values
            currentFillableFields.forEach(field => {
                const input = document.getElementById(field.name);
                if (input && input.value.trim()) {
                    const value = input.value.trim();

                    // Replace based on field type using precise patterns
                    if (field.name === 'flightNumber') {
                        // Replace CA1234, CAXXXX, CAxxxx, CA____, ___ patterns
                        text = text.replace(/CA[0-9]{4}/g, value);
                        text = text.replace(/CA[XXXX]{4}/g, value);
                        text = text.replace(/CA[xX]{4}/g, value);
                        text = text.replace(/CA(___+)/g, value);
                        text = text.replace(/(___+)/g, value);
                    }
                    if (field.name === 'gateNumber') {
                        // Replace CXX, CXX号, C\d+ patterns
                        text = text.replace(/CXX号/g, value + '号');
                        text = text.replace(/CXX/g, value);
                        text = text.replace(/C\d+号/g, value + '号');
                        text = text.replace(/C\d+/g, value);
                    }
                    if (field.name === 'time') {
                        // Replace time patterns (XX:XX format)
                        text = text.replace(/\d{1,2}:\d{2}/g, value);
                    }
                    if (field.name === 'destination') {
                        // Replace destination placeholders and explicit phrases
                        text = text.replace(/XX+/g, value);
                        text = text.replace(/前往[\u4e00-\u9fffA-Za-z·]+/g, '前往' + value);
                        text = text.replace(/飞往[\u4e00-\u9fffA-Za-z·]+/g, '飞往' + value);
                        text = text.replace(/去往[\u4e00-\u9fffA-Za-z·]+/g, '去往' + value);
                    }
                }
            });

            content.textContent = text;
        }

        function matchesToken(broadcast, token) {
            const t = token.toLowerCase();
            const type = (broadcast.广播类型 || '').toLowerCase();
            const scene = (broadcast.广播场景 || '').toLowerCase();
            const text = (broadcast.中文 || '') + (broadcast.英文 || '') + (broadcast.粤语 || '');
            const textLower = text.toLowerCase();

            if (type.includes(t) || scene.includes(t) || textLower.includes(t)) {
                return true;
            }

            const tag = searchTags.find(tagItem => tagItem.label === token);
            if (tag) {
                return tag.keywords.some(keyword => textLower.includes(keyword.toLowerCase()));
            }

            return false;
        }

        function searchBroadcasts(query) {
            const tokens = tokenizeQuery(query);
            if (tokens.length === 0) return [];

            return allBroadcasts.filter(broadcast => {
                return tokens.every(token => matchesToken(broadcast, token));
            });
        }

                }, 2000);
            }, 3000);
        });

        // Initialize app
        initBroadcasts();
        renderHotCards();
        renderScenarioCards();
        renderSearchSuggestions();
        updateFavoritesBadge();

        if (hasFlightInfo()) {
            showPage('homePage');
        } else {
            showPage('loginPage');
        }
    </script>
</body>
</html>
